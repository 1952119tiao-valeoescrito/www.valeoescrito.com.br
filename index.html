<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Apostas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .formulario {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }
    .formulario h2 {
      text-align: center;
      color: #333;
    }
    .formulario label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .formulario input, .formulario select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .formulario button {
      width: 100%;
      padding: 10px;
      background-color: #28a745;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    .formulario button.reset {
      background-color: #dc3545;
      margin-top: 10px;
    }
    .formulario button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="formulario">
    <h2>Formulário de Apostas</h2>
    <form id="apostaForm">
      <!-- Campo para o número do concurso -->
      <label for="num_extracao">Concurso nº:</label>
      <input type="text" id="num_extracao" name="num_extracao" required>

      <!-- Campo para a data -->
      <label for="data_extracao">Data:</label>
      <input type="date" id="data_extracao" name="data_extracao" required>

      <!-- Campo para o token -->
      <label for="num_token">Token nº:</label>
      <input type="text" id="num_token" name="num_token" required>

      <!-- Lista de países -->
      <label for="country_pais">País:</label>
      <select id="country_pais" name="country_pais" required>
        <option value="">Selecione um país</option>
        <option value="BR">Brasil</option>
        <option value="US">Estados Unidos</option>
        <!-- Adicione mais países aqui -->
      </select>

      <!-- Campo para o e-mail -->
      <label for="email_indicador">Seu e-mail:</label>
      <input type="email" id="email_indicador" name="email_indicador" required>

      <!-- Campo para o telefone -->
      <label for="telefone">Telefone:</label>
      <input type="text" id="telefone" name="telefone" required>

      <!-- Campos para os prognósticos -->
      <label>Prognósticos:</label>
      <div style="display: flex; gap: 10px;">
        <input type="number" id="pri_premio" name="pri_premio" min="1" max="25" required>
        <input type="number" id="seg_premio" name="seg_premio" min="1" max="25" required>
        <input type="number" id="ter_premio" name="ter_premio" min="1" max="25" required>
        <input type="number" id="qua_premio" name="qua_premio" min="1" max="25" required>
        <input type="number" id="qui_premio" name="qui_premio" min="1" max="25" required>
      </div>

      <!-- Botão de pagamento com MetaMask -->
      <button type="button" id="pagarMetaMask">Pagar com MetaMask</button>

      <!-- Botões de ação -->
      <button type="submit">Submeter</button>
      <button type="reset" class="reset">Redefinir</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <script>
    // Integração com MetaMask
    const pagarMetaMask = document.getElementById('pagarMetaMask');
    pagarMetaMask.addEventListener('click', async () => {
      if (typeof window.ethereum !== 'undefined') {
        const web3 = new Web3(window.ethereum);
        try {
          await window.ethereum.enable();
          const accounts = await web3.eth.getAccounts();
          const account = accounts[0];

          // Valor da aposta (0.00033 ETH em Wei)
          const valorAposta = web3.utils.toWei('0.00033', 'ether');

          // Enviar transação
          await web3.eth.sendTransaction({
            from: account,
            to: '0x8fa024467a4ab1286e78da4a876d18abaea667a38f1e2679069ce6b1ee8663d7', // Endereço do contrato
            value: valorAposta,
          });

          alert('Pagamento realizado com sucesso!');
        } catch (error) {
          console.error('Erro ao realizar pagamento:', error);
        }
      } else {
        alert('Por favor, instale a MetaMask.');
      }
    });

    // Validação do formulário
    const form = document.getElementById('apostaForm');
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      alert('Aposta submetida com sucesso!');
    });
  </script>
</body>
</html>
