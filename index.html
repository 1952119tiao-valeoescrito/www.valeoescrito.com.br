<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário de Apostas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: #000;
      background-color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .formulario {
      display: inline-block;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: left;
      max-width: 500px;
      width: 100%;
    }
    .formulario input, .formulario select, .formulario button {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
    .formulario button {
      background-color: #28a745;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .formulario button.reset {
      background-color: #dc3545;
    }
    .formulario button.qrcode {
      background-color: #007bff;
    }
    .formulario button:hover {
      opacity: 0.9;
    }
    #qrCodeModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    #qrCodeModal img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <form class="formulario" id="apostaForm">
    <h2>Formulário de Apostas</h2>
    <p style="text-align: center; color: red; font-weight: bold;">
      GANHA COM 5, 4, 3, 2 E ATÉ COM 1 PONTO APENAS - SORTEIOS PELA LOTERIA FEDERAL.
    </p>

    <!-- Concurso e Data -->
    <label for="num_extracao">Concurso nº:</label>
    <input id="num_extracao" name="num_extracao" required>

    <label for="data_extracao">Data:</label>
    <input id="data_extracao" name="data_extracao" type="date" required>

    <!-- Token e País -->
    <label for="num_token">Token nº:</label>
    <input id="num_token" name="num_token" required>

    <label for="country_pais">País:</label>
    <select id="country_pais" name="country_pais" required>
      <option value="">Selecione um país</option>
      <option value="BR">Brasil</option>
      <option value="US">Estados Unidos</option>
      <!-- Adicione mais países aqui -->
    </select>

    <!-- E-mail e Telefone -->
    <label for="email_indicador">Seu e-mail:</label>
    <input id="email_indicador" name="email_indicador" type="email" required>

    <label for="telefone">Telefone:</label>
    <input id="telefone" name="telefone" type="text" required>

    <!-- Prognósticos -->
    <label>Prognósticos:</label>
    <div style="display: flex; gap: 5px;">
      <input id="pri_premio" name="pri_premio" pattern="\d{1,2}x\d{1,2}" title="Formato: nxn (ex: 1x1)" required>
      <input id="seg_premio" name="seg_premio" pattern="\d{1,2}x\d{1,2}" title="Formato: nxn (ex: 1x1)" required>
      <input id="ter_premio" name="ter_premio" pattern="\d{1,2}x\d{1,2}" title="Formato: nxn (ex: 1x1)" required>
      <input id="qua_premio" name="qua_premio" pattern="\d{1,2}x\d{1,2}" title="Formato: nxn (ex: 1x1)" required>
      <input id="qui_premio" name="qui_premio" pattern="\d{1,2}x\d{1,2}" title="Formato: nxn (ex: 1x1)" required>
    </div>

    <!-- Botões de Pagamento -->
    <button type="button" id="pagarMetaMask">Pagar com MetaMask</button>
    <button type="button" id="pagarQRCode" class="qrcode">Pagar com QR Code</button>

    <!-- Botões de Ação -->
    <button type="submit">Submeter</button>
    <button type="reset" class="reset">Redefinir</button>
  </form>

  <!-- Modal do QR Code -->
  <div id="qrCodeModal">
    <h3>Escaneie o QR Code para pagar</h3>
    <img id="qrCodeImage" src="" alt="QR Code">
    <button onclick="fecharModal()">Fechar</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <script>
    // Integração com MetaMask
    const pagarMetaMask = document.getElementById('pagarMetaMask');
    pagarMetaMask.addEventListener('click', async () => {
      if (typeof window.ethereum !== 'undefined') {
        const web3 = new Web3(window.ethereum);
        try {
          // Solicitar acesso à conta do usuário
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          const account = accounts[0];

          // Valor da aposta (0.00033 ETH em Wei)
          const valorAposta = web3.utils.toWei('0.00033', 'ether');

          // Enviar transação
          await web3.eth.sendTransaction({
            from: account,
            to: '0x...', // Endereço do contrato
            value: valorAposta,
          });

          alert('Pagamento realizado com sucesso!');
        } catch (error) {
          console.error('Erro ao realizar pagamento:', error);
          alert('Erro ao realizar pagamento. Verifique o console para mais detalhes.');
        }
      } else {
        alert('Por favor, instale a MetaMask.');
      }
    });

    // Integração com QR Code
    const pagarQRCode = document.getElementById('pagarQRCode');
    const qrCodeModal = document.getElementById('qrCodeModal');
    const qrCodeImage = document.getElementById('qrCodeImage');

    pagarQRCode.addEventListener('click', () => {
      // Gerar QR Code (exemplo com um link de pagamento)
      const enderecoContrato = '0x8fa024467a4ab1286e78da4a876d18abaea667a38f1e2679069ce6b1ee8663d7'; // Endereço do contrato
      const valorAposta = '0.00033'; // Valor da aposta em ETH
      const qrCodeData = `ethereum:${enderecoContrato}?value=${web3.utils.toWei(valorAposta, 'ether')}`;
      qrCodeImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrCodeData)}`;

      // Exibir modal
      qrCodeModal.style.display = 'block';
    });

    // Fechar modal
    function fecharModal() {
      qrCodeModal.style.display = 'none';
    }

    // Validação do formulário
    const form = document.getElementById('apostaForm');
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      alert('Aposta submetida com sucesso!');
    });
  </script>
</body>
</html>
