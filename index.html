    body {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: #000;
      background-color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .formulario {
      display: inline-block;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: left;
      max-width: 500px;
      width: 100%;
    }
    .formulario input, .formulario select, .formulario button {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box; /* Garante que padding e border não aumentem a largura */
    }
    .formulario button {
      background-color: #28a745;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    .formulario button.reset {
      background-color: #dc3545;
    }
    .formulario button.qrcode {
      background-color: #007bff;
    }

    .formulario button.pix {
      background-color: #f9c851; /* Cor de destaque para o botão PIX */
      color: #000; /* Texto preto para melhor contraste */
    }

    .formulario button:hover {
      opacity: 0.9;
    }
    #qrCodeModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    #qrCodeModal img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>

  <script>

    // Integração com PIX (simulada)
    function payWithPIX() {
      const pixKey = document.getElementById('pixKey').value;

      if (!pixKey) {
        alert('Por favor, insira a chave PIX.');
        return;
      }

      // Simulação das instruções de pagamento
      const instructions = `
        Instruções de Pagamento PIX:
        1. Abra seu aplicativo bancário ou carteira digital.
        2. Escolha a opção de pagamento PIX.
        3. Utilize a seguinte chave PIX: ${pixKey}
        4. Insira o valor de 0.00033 ETH (ou o equivalente em BRL).
        5. Confirme o pagamento e guarde o comprovante.
      `;
      alert(instructions);
    }

    // Validação do formulário e lógica de pagamento
    const form = document.getElementById('apostaForm');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const paymentMethod = document.getElementById('paymentMethod').value;

       if (paymentMethod === 'pix') {
        payWithPIX();
      } else {
        alert('Selecione um método de pagamento.');
      }
    });

    // Lógica para exibir/ocultar detalhes do PIX
    const paymentMethodSelect = document.getElementById('paymentMethod');
    const pixDetailsDiv = document.getElementById('pixDetails');

    paymentMethodSelect.addEventListener('change', function() {
      if (this.value === 'pix') {
        pixDetailsDiv.style.display = 'block';
      } else {
        pixDetailsDiv.style.display = 'none';
      }
    });

     // Esconde os detalhes do PIX ao carregar a página
     pixDetailsDiv.style.display = 'none';

    // Remove Metamask e Qrcode das opções
    document.addEventListener("DOMContentLoaded", function() {
        var selectElement = document.getElementById("paymentMethod");

        // Remover a opção Metamask
        var metamaskOption = selectElement.querySelector('option[value="metamask"]');
        if (metamaskOption) {
            selectElement.removeChild(metamaskOption);
        }

        // Remover a opção Qrcode
        var qrcodeOption = selectElement.querySelector('option[value="qrcode"]');
        if (qrcodeOption) {
            selectElement.removeChild(qrcodeOption);
        }
    });

  </script>
