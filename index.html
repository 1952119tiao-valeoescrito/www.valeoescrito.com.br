<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Aposta Descentralizada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        label {
            display: inline-block;
            width: 150px;
            text-align: right;
            margin-right: 10px;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 200px;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .button-group {
            margin-top: 20px;
            text-align: center;
        }

        .button-group button {
            padding: 10px 20px;
            margin: 0 10px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .button-group button:hover {
            background-color: #0056b3;
        }

        .wallet-connect {
            margin-top: 20px;
            text-align: center;
        }

        .wallet-connect button {
            padding: 10px 15px;
            margin: 0 5px;
            border: 1px solid #007bff;
            border-radius: 5px;
            background-color: transparent;
            color: #007bff;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }

        .wallet-connect button:hover {
            background-color: #007bff;
            color: white;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Formulário de Aposta Descentralizada</h2>

    <!-- Formulário (adapte os campos e estilos conforme necessário) -->
    <form action="https://www.valeoescrito.com.br/apostar.php" class="formulario" method="post">
        <p><span style="font-size: small; color: rgb(255,0,0)"><strong style="font-weight: bolder"><span style="font-size: medium"> </span></strong><span style="font-size: 11px"><strong style="font-weight: bolder"><span>GANHA COM 5, 4, 3, 2 E ATÉ COM 1 PONTO APENAS - SORTEIOS PELA LOTERIA FEDERAL.</span></strong></span></span></p>

        <table align="center" border="0" cellpadding="1" cellspacing="1" style="width: 100%; border-collapse: collapse">
            <tbody>
                <tr>
                    <td colspan="2"> </td>
                    <td colspan="11">Preencha os dados abaixo:</td>
                </tr>
                <tr>
                    <td colspan="2"><label for="extracao">Extração n.:</label></td>
                    <td colspan="11"><input type="text" id="extracao" name="extracao" required placeholder="Número da Extração" style="width: 100%;"></td>
                </tr>
                <tr>
                    <td colspan="2"><label for="tokenNumber">Token Nº:</label></td>
                    <td colspan="2"><input type="text" id="tokenNumber" name="tokenNumber" style="width: 100%;"></td>
                    <td><label for="pais">País:</label></td>
                    <td colspan="8">
                        <select id="pais" name="country_pais" style="width: 100%;">
                            <option value="" disabled selected>Selecione um país</option>
                            <!-- Países serão carregados aqui -->
                        </select>
                    </td>
                </tr>
                 <tr>
                    <td colspan="2"><label for="telefone">Telefone:</label></td>
                    <td colspan="10"><input type="text" id="telefone" name="telefone" style="width: 100%;"></td>
                    <td style="text-align: center"> </td>
                </tr>
                <tr>
                    <td colspan="2"><label for="email_indicador">Seu e-mail:</label></td>
                    <td colspan="10"><input type="text" id="email_indicador" name="email_indicador" style="width: 100%;"></td>
                    <td style="text-align: center"> </td>
                </tr>
                <tr>
                    <td colspan="2"><label for="email_investidor">Seu indicado:</label></td>
                    <td colspan="10"><input type="text" id="email_investidor" name="email_investidor" style="width: 100%;"></td>
                    <td style="text-align: center"> </td>
                </tr>
                <tr>
                    <td colspan="2"><label>Colocação:</label></td>
                    <td>1º Prêmio:</td>
                    <td>2º Prêmio:</td>
                    <td>3º Prêmio:</td>
                    <td>4º Prêmio:</td>
                    <td>5º Prêmio:</td>
                    <td colspan="6"> </td>
                </tr>
                <tr>
                    <td colspan="2"><label>Prognósticos:</label></td>
                    <td><input type="text" id="pri_premio" name="pri_premio" style="width: 100%;"></td>
                    <td><input type="text" id="seg_premio" name="seg_premio" style="width: 100%;"></td>
                    <td><input type="text" id="ter_premio" name="ter_premio" style="width: 100%;"></td>
                    <td><input type="text" id="qua_premio" name="qua_premio" style="width: 100%;"></td>
                    <td><input type="text" id="qui_premio" name="qui_premio" style="width: 100%;"></td>
                    <td colspan="6"> </td>
                </tr>
                <tr>
                    <td colspan="13" style="text-align: center">
                        <div class="button-group">
                            <button type="submit">Submeter</button>
                            <button type="reset">Redefinir</button>
                        </div>
                    </td>
                </tr>
                <tr>
                    <td colspan="13" style="text-align: center">
                        <div class="wallet-connect">
                           <button onclick="conectarComMetamask()">Conectar com Metamask</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </form>
</div>

<script>
    // URL do arquivo JSON com a lista de países (substitua pelo seu)
    const countriesJsonUrl = 'https://gist.githubusercontent.com/incredimike/1469814/raw/75ebc2984795ced98c9c19b2f42f6a08b0b84e1a/countries.json';

    // Lista de países de fallback (caso o JSON não carregue)
     const fallbackCountries = {
        "AF": "Afeganistão", "ZA": "África do Sul", "AL": "Albânia", "DE": "Alemanha", "AD": "Andorra", "AO": "Angola", "AG": "Antígua e Barbuda", "SA": "Arábia Saudita", "DZ": "Argélia", "AR": "Argentina", "AM": "Armênia", "AU": "Austrália", "AT": "Áustria", "AZ": "Azerbaijão", "BS": "Bahamas", "BH": "Bahrein", "BD": "Bangladesh", "BB": "Barbados", "BY": "Belarus", "BE": "Bélgica", "BZ": "Belize", "BJ": "Benin", "BT": "Butão", "BO": "Bolívia", "BA": "Bósnia e Herzegovina", "BW": "Botsuana", "BR": "Brasil", "BN": "Brunei", "BG": "Bulgária", "BF": "Burkina Faso", "BI": "Burundi", "CV": "Cabo Verde", "KH": "Camboja", "CA": "Canadá", "TD": "Chade", "CL": "Chile", "CN": "China", "CY": "Chipre", "CO": "Colômbia", "KM": "Comores", "CG": "Congo", "CD": "Congo, República Democrática", "KR": "Coreia do Sul", "CR": "Costa Rica", "HR": "Croácia", "CU": "Cuba", "DK": "Dinamarca", "DM": "Dominica", "DO": "República Dominicana", "EC": "Equador", "EG": "Egito", "SV": "El Salvador", "AE": "Emirados Árabes Unidos", "ER": "Eritreia", "SK": "Eslováquia", "SI": "Eslovênia", "ES": "Espanha", "US": "Estados Unidos", "EE": "Estônia", "ET": "Etiópia", "FJ": "Fiji", "FI": "Finlândia", "FR": "França", "GA": "Gabão", "GM": "Gâmbia", "GE": "Geórgia", "DE": "Alemanha", "GH": "Gana", "GR": "Grécia", "GD": "Granada", "GT": "Guatemala", "GN": "Guiné", "GW": "Guiné-Bissau", "GQ": "Guiné Equatorial", "GY": "Guiana", "HT": "Haiti", "HN": "Honduras", "HU": "Hungria", "IS": "Islândia", "IN": "Índia", "ID": "Indonésia", "IR": "Irã", "IQ": "Iraque", "IE": "Irlanda", "IL": "Israel", "IT": "Itália", "JM": "Jamaica", "JP": "Japão", "JO": "Jordânia", "KZ": "Cazaquistão", "KE": "Quênia", "KI": "Kiribati", "KW": "Kuwait", "KG": "Quirguistão", "LA": "Laos", "LV": "Letônia", "LB": "Líbano", "LS": "Lesoto", "LR": "Libéria", "LY": "Líbia", "LI": "Liechtenstein", "LT": "Lituânia", "LU": "Luxemburgo", "MK": "Macedônia", "MG": "Madagascar", "MW": "Malawi", "MY": "Malásia", "MV": "Maldivas", "ML": "Mali", "MT": "Malta     };

    async function loadCountries() {
        try {
            const response = await fetch(countriesJsonUrl);
            if (!response.ok) {
                throw new Error(`Erro ao carregar a lista de países: ${response.status}`);
            }
            const countries = await response.json();
            populateCountries(countries);
        } catch (error) {
            console.error("Erro ao carregar lista de países:", error);
            console.log("Usando lista de países de fallback.");
            populateCountries(fallbackCountries);
        }
    }

    function populateCountries(countries) {
        const selectElement = document.getElementById("pais");
        // Se o arquivo JSON tem a estrutura { "Código": "País", ... }
        if (typeof countries === 'object' && !Array.isArray(countries)) {
            for (const code in countries) {
                if (countries.hasOwnProperty(code)) {
                    const name = countries[code];
                    const option = document.createElement("option");
                    option.value = code; // Use o código como valor
                    option.text = name; // Use o nome como texto
                    selectElement.add(option);
                }
            }
        }
        // Se o arquivo JSON tem a estrutura [{ "name": "País", "code": "Código" }, ...]
        else if (Array.isArray(countries)) {
             countries.forEach(country => {
                const option = document.createElement("option");
                option.value = country.code; // Use o código como valor
                option.text = country.name; // Use o nome como texto
                selectElement.add(option);
            });
        } else {
            console.error("Formato de arquivo JSON inválido.");
             populateFallback(selectElement); // Chama a função para popular com a lista de fallback
        }
    }

     function populateFallback(selectElement) {
          for (const code in fallbackCountries) {
              if (fallbackCountries.hasOwnProperty(code)) {
                  const name = fallbackCountries[code];
                  const option = document.createElement("option");
                  option.value = code;
                  option.text = name;
                  selectElement.add(option);
              }
          }
      }
    // Função para conectar com Metamask
    async function conectarComMetamask() {
        if (window.ethereum) {
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                web3 = new Web3(window.ethereum);
                const accounts = await web3.eth.getAccounts();
                 const extracaoValue = document.getElementById("extracao").value;
                 if (!extracaoValue) {
                      alert("Preencha o campo Extração n.:");
                      return;
                 }
                alert("Conectado ao Metamask! Conta: " + accounts[0]);
            } catch (error) {
                console.error("Erro ao conectar com Metamask:", error);
                alert("Erro ao conectar com Metamask.");
            }
        } else {
            alert("Metamask não detectado. Instale a extensão Metamask.");
        }
    }

    // Carrega a lista de países quando a página é carregada
    window.onload = loadCountries;
</script>

</body>
</html>
