<!-- Modal do QR Code -->

<div id="qrCodeModal">
<h3>Escaneie o QR Code para pagar</h3>
<img alt="QR Code" id="qrCodeImage" src="" /><button onclick="fecharModal()">Fechar</button></div>
<script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script><script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script><script>
    // Inicialização do Web3 e solicitação de acesso ao MetaMask
    let web3;

    async function initWeb3() {
      if (typeof window.ethereum !== 'undefined') {
        web3 = new Web3(window.ethereum);
        try {
          // Solicitar acesso à conta do usuário
          await window.ethereum.request({ method: 'eth_requestAccounts' });
          console.log('MetaMask conectado com sucesso!');
        } catch (error) {
          console.error('Usuário negou acesso ao MetaMask:', error);
          alert('Para usar o MetaMask, por favor, permita o acesso à sua conta.');
          return false; //Indica que a inicialização falhou
        }
      } else {
        console.warn('MetaMask não detectado!');
        alert('Por favor, instale o MetaMask para usar este método de pagamento.');
        return false; //Indica que a inicialização falhou
      }
      return true; //Indica que a inicialização foi bem-sucedida
    }

    // Função para pagar com MetaMask
    async function payWithMetaMask() {
      if (!web3) { //Verifica se o web3 foi inicializado com sucesso
        alert('MetaMask não está pronto. Tente novamente.');
        return;
      }

      try {
        const accounts = await web3.eth.getAccounts();
        const account = accounts[0];
        const valorAposta = web3.utils.toWei('0.00033', 'ether');
        const contractAddress = '0x...'; // Substitua pelo endereço do contrato

        const transactionParameters = {
          from: account,
          to: contractAddress,
          value: valorAposta,
          gas: 21000, // Gas limit (pode precisar ajuste)
        };

        const txHash = await window.ethereum.request({
          method: 'eth_sendTransaction',
          params: [transactionParameters],
        });

        console.log('Transação enviada com hash:', txHash);
        alert('Pagamento realizado com sucesso! Hash da transação: ' + txHash);
      } catch (error) {
        console.error('Erro ao realizar pagamento com MetaMask:', error);
        alert('Erro ao realizar pagamento com MetaMask. Verifique o console para mais detalhes.');
      }
    }


    // Função para gerar QR Code
    function generateQRCode() {
      const enderecoContrato = '0x8fa024467a4ab1286e78da4a876d18abaea667a38f1e2679069ce6b1ee8663d7'; // Substitua pelo endereço do contrato
      const valorAposta = '0.00033'; // Valor da aposta em ETH
      const qrCodeData = `ethereum:${enderecoContrato}?value=${web3.utils.toWei(valorAposta, 'ether')}`;


      // Limpa o QR Code anterior (se existir)
      qrCodeImage.src = "";
      document.getElementById('qrCodeImage').innerHTML = ''; // Limpa qualquer conteúdo anterior

      // Gera o QR Code usando qrcodejs
      const qrcode = new QRCode(document.getElementById('qrCodeImage'), {
        text: qrCodeData,
        width: 128,
        height: 128,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });

       // Exibir modal
       qrCodeModal.style.display = 'block';
    }


    // Integração com PIX (simulada)
    function payWithPIX() {
      const pixKey = document.getElementById('pixKey').value;

      if (!pixKey) {
        alert('Por favor, insira a chave PIX.');
        return;
      }

      // Simulação das instruções de pagamento
      const instructions = `
        Instruções de Pagamento PIX:
        1. Abra seu aplicativo bancário ou carteira digital.
        2. Escolha a opção de pagamento PIX.
        3. Utilize a seguinte chave PIX: ${pixKey}
        4. Insira o valor de 0.00033 ETH (ou o equivalente em BRL).
        5. Confirme o pagamento e guarde o comprovante.
      `;
      alert(instructions);
    }


    // Fechar modal do QR Code
    function fecharModal() {
      qrCodeModal.style.display = 'none';
    }


    // Validação do formulário e lógica de pagamento
    const form = document.getElementById('apostaForm');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const paymentMethod = document.getElementById('paymentMethod').value;

       if (paymentMethod === 'metamask') {
          if (await initWeb3()) { // Inicializa o web3 e verifica o resultado
              payWithMetaMask();
          }
       } else if (paymentMethod === 'qrcode') {
            if(!web3){
                if (await initWeb3() === false) {
                return; // Não prossegue se a inicialização do MetaMask falhar
                }
            }
            generateQRCode();
       } else if (paymentMethod === 'pix') {
        payWithPIX();
      } else {
        alert('Selecione um método de pagamento.');
      }
    });


    // Lógica para exibir/ocultar detalhes do PIX
    const paymentMethodSelect = document.getElementById('paymentMethod');
    const pixDetailsDiv = document.getElementById('pixDetails');

    paymentMethodSelect.addEventListener('change', function() {
      if (this.value === 'pix') {
        pixDetailsDiv.style.display = 'block';
      } else {
        pixDetailsDiv.style.display = 'none';
      }
    });

    // Inicializa o Web3 quando a página carrega
    window.addEventListener('load', async () => {
        await initWeb3();
    });
  </script></body>
